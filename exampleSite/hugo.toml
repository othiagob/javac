baseURL = "https://othiagob.github.io/javac/"
title = "String[] args"
author = "Thiago B."
copyright = "© 2026, String[] args"
languageCode = "pt-BR"
DefaultContentLanguage = "pt"
defaultContentLanguageInSubdir = false
enableInlineShortcodes = true
ignoreErrors = ["error-remote-getjson"]

[pagination]
  pagerSize = 5

# ------------------------------
[module]
  [[module.imports]]
    path = "github.com/othiagob/javac"

[params]
  color = 'linen'
  github = 'othiagob'
  monoDarkIcon = true

  avatar = ''
  name = 'Thiago B.'
  bio = 'Desenvolvedor em formação. Escrevo sobre programação e Tibia.'
# ------------------------------

# Necessário para renderizar HTML direto no Markdown (<sub>, <sup>, <kbd>, <mark>)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = "sobre"
    name = "Sobre"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "arquivo"
    name = "Arquivo"
    url = "/archives/"
    weight = 20

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[privacy]
  [privacy.youtube]
    disabled = false
    privacyEnhanced = true
